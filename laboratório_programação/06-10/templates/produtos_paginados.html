<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos Páginados</title>
</head>
<body>
    <nav>
        <ul class="pagination">
            {% for page_num in range(1, total_pages + 1) %}
            <li class="page-tem {% if page == page_num %}active{% endif %}">
                <a class="page-link" href="{{ url_for('listar_produtos_paginados', page=page_num) }}">
                    {{ page_num }}
                </a>
            </li>
            {% endfor %}
        </ul>
    </nav>
</body>
</html>
